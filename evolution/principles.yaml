principles:
  - id: p1
    text: "When debugging build or compilation issues, check the Makefile first — it's the authoritative source for build flags, tags, and dependencies"
    source: "Debugged FTS5 SQLite error by finding -tags sqlite_fts5 in Makefile"
    confidence: 0.7
    created: "2025-01-01"

  - id: p2
    text: "When analyzing memory systems, check both project-scoped recalls and system-wide status — project recalls may show 0 while system has hundreds"
    source: "Reviewed mnemonic system: recall_project showed 0, status showed 385 total"
    confidence: 0.6
    created: "2025-01-01"

  - id: p3
    text: "Read evolution files (principles, strategies) before starting any analysis or audit task — avoids rediscovering known patterns"
    source: "Codebase audit task: read evolution files after analysis and missed chance to skip already-known territory"
    confidence: 0.6
    created: "2025-01-01"

  - id: p4
    text: "When multiple tool calls are independent, always batch them in a single response — never call them sequentially if no dependency exists"
    source: "System instructions + observed that parallel recall/patterns/status calls consistently cut pre-task overhead"
    confidence: 0.8
    created: "2025-01-01"

  - id: p5
    text: "When the same approach fails twice, stop and change strategy — don't retry the identical action a third time"
    source: "System instructions; confirmed through sessions where early pivots resolved issues faster"
    confidence: 0.7
    created: "2025-01-01"

  - id: p6
    text: "Before writing a new file, verify no existing file serves the same purpose using Glob or Grep"
    source: "System instructions; early sessions occasionally created redundant files"
    confidence: 0.8
    created: "2025-01-01"

  - id: p7
    text: "For diagnostic/status questions, use diagnostic tools directly (status, ps, logs) — not semantic recall"
    source: "User asked 'can you see all the memories now?' — recall returned irrelevant docs; status gave the precise answer"
    confidence: 0.6
    created: "2025-01-01"

  - id: p8
    text: "When a code fix is correct but has no observable effect, the first hypothesis is a stale binary — identify ALL processes using the binary and confirm which run the new version"
    source: "Fixed encoding agent bug but MCP server process still used old binary"
    confidence: 0.8
    created: "2025-01-01"

  - id: p9
    text: "In a multi-process pipeline, trace the actual data flow path BEFORE inspecting code — verify which process handles each stage"
    source: "Spent many turns verifying correct code before discovering the MCP server runs its own encoder"
    confidence: 0.7
    created: "2025-01-01"

  - id: p10
    text: "For data-driven systems (daemons, memory systems), query the actual runtime database before reading code — DB shows what IS happening; code shows what SHOULD happen"
    source: "System audit: project-local mnemonic.db was empty; real data was at ~/.mnemonic/memory.db. DB queries confirmed/refuted every hypothesis faster than code analysis alone"
    confidence: 0.8
    created: "2026-02-25"

  - id: p12
    text: "For symbol-targeted code audits (e.g., 'find all LLM calls'), grep for the exact symbol first to get a complete inventory, then use targeted offset/limit reads — never read large files sequentially hoping to find call sites"
    source: "Prompt audit: grep for llmProvider.Complete found all 10 call sites in one shot; sequential file reads would have missed some and wasted turns on irrelevant code"
    confidence: 0.7
    created: "2026-02-25"

  - id: p11
    text: "Verify subagent line-number and code-location claims with targeted Read calls before treating them as confirmed — subagents can plausibly hallucinate specific line numbers while getting the conceptual finding right"
    source: "Explore subagent gave detailed file:line bug reports; most concepts were correct but some line numbers needed verification against actual reads"
    confidence: 0.7
    created: "2026-02-25"
