strategies:
  daemon_startup:
    steps:
      - "Check if daemon is already running (ps, pidfile)"
      - "Examine config files for correct paths and settings"
      - "Check Makefile for build requirements and flags"
      - "Rebuild if binary is missing build tags or outdated"
      - "Start daemon using proper command (check Makefile targets)"
      - "Verify health via logs, API endpoint, or status command"
    tips:
      - "Database errors may indicate binary missing compile-time features (e.g., FTS5 needs build tags)"
      - "Makefiles often have 'start', 'stop', 'status' targets — use them instead of manual commands"
    learned_from: "Multiple daemon startup sessions"

  memory_analysis:
    steps:
      - "Call recall_project, recall, and get_patterns in parallel for comprehensive view"
      - "Call get_insights and status for complete picture"
      - "Compare project-scoped vs system-wide counts to understand context"
      - "Identify repeated abstractions (same text, same confidence) as priority patterns"
      - "Review system warnings for actionable issues"
      - "Synthesize into categories: architecture, principles, health, actionable insights"
    tips:
      - "Multiple identical abstractions indicate strongly reinforced patterns — prioritize these"
      - "Project recalls may show 0 while system has hundreds — check both scopes"
      - "System warnings (source_balance, quality_audit) indicate specific issues to address"
      - "For 'what changed recently' questions, use recall_timeline — NOT semantic recall"
      - "Audit abstractions separately: healthy = ~8-10 active L2, 2-3 active L3. More = dedup bug firing"
    learned_from: "Multiple memory analysis sessions"

  system_verification:
    steps:
      - "Check process status (is daemon/service running?)"
      - "Query database state (check PRAGMA table_info first for schema, then count records)"
      - "Review recent logs for active operations (look for timestamps, new IDs)"
      - "Verify configuration (which components are enabled?)"
      - "Check processing queues (unprocessed counts show active work)"
      - "Measure growth over time (compare before/after counts to prove activity)"
    tips:
      - "Process running ≠ working — check data flow, logs, and queue processing"
      - "Always verify database schema with PRAGMA table_info before assuming column names"
      - "Growth metrics prove autonomy: X→Y memories in N minutes shows active ingestion"
      - "Multi-source evidence prevents false confidence from single indicators"
    learned_from: "Multiple system verification sessions"

  codebase_audit:
    steps:
      - "Read evolution files first (principles, strategies) to avoid re-discovering known patterns"
      - "Call mcp__mnemonic__status and get_insights to surface active health warnings"
      - "Locate the actual RUNNING database — may differ from project-local DB files (e.g., daemon writes to ~/.mnemonic/memory.db, not /project/mnemonic.db)"
      - "Query the runtime DB directly: table counts, state breakdowns, duplicate checks, source ratios"
      - "Delegate deep code exploration to the Explore subagent — returns structured analysis without bloating context"
      - "Verify subagent file:line claims with targeted Read calls on the specific files before treating as confirmed"
      - "Cross-reference DB ground truth with code findings — DB confirms what IS broken, code explains WHY"
      - "Organize output by: architecture strengths, test gaps, error handling, code quality, quick wins vs. deeper work"
      - "End with a priority table (severity × effort) to make findings actionable"
    tips:
      - "System health warnings (source_balance, recall_effectiveness) in meta_observations table are highest-signal findings — query it first"
      - "DB-first audit: duplicate abstractions are visible as repeated titles in the DB; pattern strength saturation shows as all-1.0 values"
      - "Subagent concepts are usually right; specific line numbers need verification"
      - "Combine internal health (mnemonic tools + DB queries) with external code analysis (Explore subagent)"
      - "get_insights duplicate abstractions = consolidation/deduplication bug in the daemon, not genuine variety"
    learned_from: "Full Mnemonic system audit 2026-02-25: DB queries confirmed 6 of 8 bugs; subagent found correct concepts but some line numbers needed verification"

  code_improvement:
    steps:
      - "Read ALL files to be modified before touching any of them — full context upfront"
      - "Use TodoWrite to list each change as a discrete task"
      - "Implement smallest/safest changes first (imports, constants, error handling)"
      - "Implement larger changes next (new logic, tests)"
      - "Run tests once at the end to validate all changes together"
    tips:
      - "Reading all files first eliminates backtracking — changes are consistent on the first pass"
      - "Write test helper functions at module level (not inside test methods) to reduce boilerplate"
      - "Keep user-facing print() calls as-is; only convert diagnostic/internal prints to logging"
      - "Mark todos complete immediately after each file edit, not in batches"
    learned_from: "Multiple code improvement sessions"

  debugging:
    steps:
      - "Read the full error message carefully — identify the exact failing component and error type"
      - "Check the Makefile first for build flags and requirements"
      - "Check logs if available — look for the root cause, not just the symptom"
      - "Form a specific hypothesis about root cause before investigating further"
      - "Verify hypothesis with minimal investigation — don't over-explore before testing your theory"
      - "Fix the root cause, not the symptom"
      - "Run tests or reproduce the original error to confirm the fix worked"
    tips:
      - "Single-symptom diagnosis often misses cascading causes — look for related errors nearby"
      - "If the error is a compilation/build issue, check Makefile build tags before editing code"
      - "Database schema errors often mean a mismatch — use PRAGMA table_info to verify actual columns"
      - "If the same fix fails twice, you have the wrong hypothesis — re-read the error from scratch"
      - "When a fix is correct but has no effect, check if ALL processes using the binary were restarted"
      - "For multi-process pipelines: map the actual data flow path EARLY before reading any code"
    learned_from: "Multiple debugging sessions"

  new_feature:
    steps:
      - "Read ALL files that will be touched before modifying any — understand the full context first"
      - "Check existing patterns: how does similar functionality already work in this codebase?"
      - "Verify no existing file/function already does this before creating anything new"
      - "Use TodoWrite to list each discrete change across files"
      - "Implement in layers: types/interfaces/signatures first, logic second, tests third"
      - "Run existing tests before and after changes"
    tips:
      - "New code should look like it belongs — match existing style, naming, error handling patterns"
      - "Prefer editing existing files over creating new ones"
      - "Tests should be added alongside the feature, not as an afterthought"
      - "If the feature touches infrastructure files, confirm with user first"
    learned_from: "Multiple new feature sessions"

  prompt_audit:
    steps:
      - "Read the LLM provider implementation first (e.g., lmstudio.go) — understand API mechanics, supported fields, retry logic before inspecting prompts"
      - "grep -rn 'llmProvider.Complete\\|llmProvider.Embed' across all agent files (excluding _test.go) — get the complete call site inventory in one shot"
      - "grep -rn 'Role.*system' to check system-role usage — absence is a significant finding for local model reliability"
      - "For each call site: grep for the prompt-building function name, then Read with offset/limit to that function"
      - "Note: temperature, MaxTokens, and whether tools are passed — these reveal the designer's intent"
      - "Identify what dynamic context is injected vs. what is static/templated"
      - "Check for escape hatches (has_principle: false, is_pattern: false) — good prompts let the model say no"
      - "Check for parallel prompt pipelines that bypass shared dedup/validation logic"
    tips:
      - "Large agent files (>30KB) will get truncated — always grep for function line numbers first, then use offset/limit reads"
      - "Inline persona ('You are a curious mind...') is a system-prompt substitute — fine for Claude, unreliable for small local models"
      - "extractJSON helpers are a smell — they exist because the model ignores format instructions; system roles reduce this"
      - "Low MaxTokens (e.g., 30 for relationship classification) is a feature — forces concise structured output"
      - "Tool-use loop prompts are the highest-risk for local models — always flag these separately"
    learned_from: "Full Mnemonic prompt audit 2026-02-25: found 10 call sites, no system roles, 2 prompt variants in episoding/encoding agents, tool-use loop in retrieval"

  self_improvement:
    steps:
      - "Read evolution files first (principles, strategies, prompt_patches, changelog)"
      - "Call recall_project, recall, and get_patterns in parallel for additional context"
      - "Survey project structure if MEMORY.md is absent or stale"
      - "Identify gaps systematically: missing MEMORY.md, missing strategies, thin principles"
      - "Prioritize by leverage: MEMORY.md > principles/strategies > niche improvements"
      - "Execute changes in order: MEMORY.md first, then principles, then strategies, then prompt_patches"
      - "Update changelog last, after all other changes are complete"
      - "Store 1-2 key learnings in mcp__mnemonic__remember with project scope"
    tips:
      - "Only add principles with real evidence — speculation at 0.5 confidence or below is not worth the noise"
      - "MEMORY.md should stay under 150 lines — compact, factual, and structured beats verbose"
      - "A missing MEMORY.md is always the highest-leverage fix — it affects every future session"
      - "After making changes, verify MEMORY.md reflects the updated state"
    learned_from: "Multiple self-improvement sessions"
